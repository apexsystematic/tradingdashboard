<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Systematic Trading Dashboard</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        bgApp: '#0B121C', bgCard: '#121A25', borderSubtle: '#1F2937',
                        textMain: '#F3F4F6', textMuted: '#6B7280',
                        bullish: '#25C2A0', bearish: '#F45B69'
                    },
                    fontFamily: { sans: ['Inter', 'sans-serif'], mono: ['JetBrains Mono', 'monospace'] }
                }
            }
        }
    </script>
    <script src="https://unpkg.com/lightweight-charts/dist/lightweight-charts.standalone.production.js"></script>

    <style>
        body { background-color: #0B121C; color: #F3F4F6; }
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: #0B121C; }
        ::-webkit-scrollbar-thumb { background: #1F2937; border-radius: 3px; }
        ::-webkit-scrollbar-thumb:hover { background: #6B7280; }
        .chart-container { height: 300px; width: 100%; position: relative; }
        .loader { border: 2px solid #1F2937; border-top: 2px solid #25C2A0; border-radius: 50%; width: 24px; height: 24px; animation: spin 1s linear infinite; display: inline-block; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        .loading-overlay { position: absolute; inset: 0; display: flex; align-items: center; justify-content: center; background: #121A25; z-index: 10; }
    </style>
</head>
<body class="font-sans antialiased p-2 md:p-4">

    <header class="mb-4 flex justify-between items-end border-b border-borderSubtle pb-2">
        <div>
            <h1 class="text-xl font-bold tracking-wide">MARKET SCREENER</h1>
            <p class="text-xs text-textMuted uppercase tracking-wider">Top 50 Liquidity Engine</p>
        </div>
        <div class="text-right font-mono text-sm text-textMuted flex flex-col items-end">
            <span id="clock">00:00:00 UTC</span>
            <span id="status" class="text-xs text-bullish mt-1 flex items-center gap-2">Initializing API...</span>
        </div>
    </header>

    <div class="grid grid-cols-1 lg:grid-cols-3 gap-4">
        <div class="bg-bgCard border border-borderSubtle rounded-lg p-4 lg:col-span-2 shadow-lg relative">
            <div class="flex justify-between items-center mb-2">
                <h2 class="text-sm font-semibold text-textMuted uppercase">Altcoin SMA Breadth (%)</h2>
                <div class="text-xs text-textMuted font-mono flex gap-3">
                    <span style="color: #25C2A0;">■ 10d</span>
                    <span style="color: #3B82F6;">■ 20d</span>
                    <span style="color: #F59E0B;">■ 50d</span>
                    <span style="color: #F45B69;">■ 200d</span>
                </div>
            </div>
            <div id="smaChart" class="chart-container"><div class="loading-overlay" id="smaLoader"><div class="loader"></div></div></div>
        </div>

        <div class="bg-bgCard border border-borderSubtle rounded-lg p-4 shadow-lg relative">
            <div class="flex justify-between items-center mb-2">
                <h2 class="text-sm font-semibold text-textMuted uppercase">Fear & Greed Index</h2>
                <span id="fgCurrent" class="text-xs font-mono text-textMuted font-bold">LOADING</span>
            </div>
            <div id="fgChart" class="chart-container"><div class="loading-overlay" id="fgLoader"><div class="loader"></div></div></div>
        </div>

        <div class="bg-bgCard border border-borderSubtle rounded-lg p-4 shadow-lg lg:col-span-3">
            <h2 class="text-sm font-semibold text-textMuted uppercase mb-3">52-Week Highs & Lows (Top 50)</h2>
            <div class="flex items-center w-full bg-borderSubtle h-6 rounded-full overflow-hidden font-mono text-xs font-bold relative">
                <div id="highsBar" class="bg-bullish h-full flex items-center justify-start px-3 text-bgApp transition-all duration-1000" style="width: 50%;">HIGHS: 0</div>
                <div id="lowsBar" class="bg-bearish h-full flex items-center justify-end px-3 text-bgApp transition-all duration-1000" style="width: 50%;">LOWS: 0</div>
            </div>
        </div>

        <div class="bg-bgCard border border-borderSubtle rounded-lg p-4 shadow-lg">
            <div class="flex justify-between items-center mb-4">
                <h2 class="text-sm font-semibold text-textMuted uppercase">Top Gainers (24H)</h2>
            </div>
            <ul class="space-y-2 font-mono text-sm" id="gainersList">
                <li class="flex justify-center py-4"><div class="loader"></div></li>
            </ul>
        </div>

        <div class="bg-bgCard border border-borderSubtle rounded-lg p-4 shadow-lg">
            <div class="flex justify-between items-center mb-4">
                <h2 class="text-sm font-semibold text-textMuted uppercase">Top Volume (24H)</h2>
            </div>
            <ul class="space-y-2 font-mono text-sm" id="volumeList">
                <li class="flex justify-center py-4"><div class="loader"></div></li>
            </ul>
        </div>
        
        <div class="bg-bgCard border border-borderSubtle rounded-lg p-4 shadow-lg">
            <h2 class="text-sm font-semibold text-textMuted uppercase mb-4">Engine Logs</h2>
            <div id="logs" class="font-mono text-xs text-textMuted space-y-1 h-48 overflow-y-auto"></div>
        </div>
    </div>

    <script>
    // --- Chart Initializations ---
    const chartOptions = {
        layout: { background: { type: 'solid', color: 'transparent' }, textColor: '#6B7280' },
        grid: { vertLines: { color: '#1F2937' }, horzLines: { color: '#1F2937' } },
        timeScale: { borderColor: '#1F2937', timeVisible: false },
        rightPriceScale: { borderColor: '#1F2937' },
    };

    const smaChart = LightweightCharts.createChart(document.getElementById('smaChart'), chartOptions);
    const sma10Series = smaChart.addLineSeries({ color: '#25C2A0', lineWidth: 2 });
    const sma20Series = smaChart.addLineSeries({ color: '#3B82F6', lineWidth: 2 });
    const sma50Series = smaChart.addLineSeries({ color: '#F59E0B', lineWidth: 2 });
    const sma200Series = smaChart.addLineSeries({ color: '#F45B69', lineWidth: 2 });

    const fgChart = LightweightCharts.createChart(document.getElementById('fgChart'), chartOptions);
    const fgSeries = fgChart.addAreaSeries({
        topColor: 'rgba(244, 91, 105, 0.4)', bottomColor: 'rgba(244, 91, 105, 0.0)',
        lineColor: '#F45B69', lineWidth: 2,
    });

    // --- Helper Functions ---
    function formatVal(val, isVol = false) {
        if (isVol) return '$' + (val / 1e6).toFixed(1) + 'M';
        return (val > 0 ? '+' : '') + val.toFixed(2) + '%';
    }

    function populateList(elementId, data, isVolume = false) {
        document.getElementById(elementId).innerHTML = data.map(item => `
            <li class="flex justify-between items-center py-1 border-b border-borderSubtle last:border-0">
                <span class="text-textMain">${item.symbol.replace('USDT','')}</span>
                <span class="${isVolume ? 'text-textMain' : (item.val > 0 ? 'text-bullish' : 'text-bearish')}">
                    ${formatVal(item.val, isVolume)}
                </span>
            </li>
        `).join('');
    }

    // --- Fetch Data from Python Backend ---
    let globalListData = null;

    async function fetchDashboardData() {
        try {
            // Point this to your Python server URL
            const response = await fetch('http://localhost:8000/api/dashboard');
            const data = await response.json();

            if (data.status === 'initializing') {
                document.getElementById('status').innerText = 'Backend Warming Up...';
                setTimeout(fetchDashboardData, 5000); // Poll every 5s until ready
                return;
            }

            // 1. Populate Charts
            sma10Series.setData(data.breadth.b10);
            sma20Series.setData(data.breadth.b20);
            sma50Series.setData(data.breadth.b50);
            sma200Series.setData(data.breadth.b200);
            smaChart.timeScale().fitContent();

            fgSeries.setData(data.fear_greed);
            fgChart.timeScale().fitContent();
            
            const currentFg = data.fear_greed[data.fear_greed.length - 1].value;
            document.getElementById('fgCurrent').innerText = `INDEX: ${currentFg}`;
            document.getElementById('fgCurrent').className = `text-xs font-mono font-bold ${currentFg > 50 ? 'text-bullish' : 'text-bearish'}`;

            // Remove Loaders
            document.getElementById('smaLoader').style.display = 'none';
            document.getElementById('fgLoader').style.display = 'none';

            // 2. Populate 52-Week Extremes
            const total = data.extremes.highs + data.extremes.lows;
            let hPct = 50, lPct = 50;
            if (total > 0) {
                hPct = (data.extremes.highs / total) * 100;
                lPct = (data.extremes.lows / total) * 100;
            }
            document.getElementById('highsBar').style.width = `${Math.max(15, hPct)}%`;
            document.getElementById('highsBar').innerText = `HIGHS: ${data.extremes.highs}`;
            document.getElementById('lowsBar').style.width = `${Math.max(15, lPct)}%`;
            document.getElementById('lowsBar').innerText = `LOWS: ${data.extremes.lows}`;

            // 3. Populate Lists
            globalListData = data.lists;
            populateList('gainersList', globalListData.daily_gainers);
            populateList('volumeList', globalListData.daily_volume, true);

            document.getElementById('status').innerText = 'System Live & Synced';
            document.getElementById('status').className = 'text-xs text-bullish mt-1';

        } catch (error) {
            console.error('Error fetching data:', error);
            document.getElementById('status').innerText = 'Backend Offline';
            document.getElementById('status').className = 'text-xs text-bearish mt-1';
        }
    }

    // List Toggles (Daily / Weekly)
    document.getElementById('btnGainers1D').addEventListener('click', () => populateList('gainersList', globalListData.daily_gainers));
    document.getElementById('btnGainers1W').addEventListener('click', () => populateList('gainersList', globalListData.weekly_gainers));
    document.getElementById('btnVolume1D').addEventListener('click', () => populateList('volumeList', globalListData.daily_volume, true));
    document.getElementById('btnVolume1W').addEventListener('click', () => populateList('volumeList', globalListData.weekly_volume, true));

    // Clock and Init
    setInterval(() => document.getElementById('clock').innerText = new Date().toISOString().substring(11, 19) + ' UTC', 1000);
    fetchDashboardData();

    </script>
    
</body>
</html>
